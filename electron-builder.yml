appId: dev.yomiko.app
productName: yomiko
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!vendor/*'
  - '!scripts/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,PLAN.md,SETUP.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  - from: resources/dict
    to: dict
    filter: ['*.db']
  - from: resources/bin
    to: bin
    filter: ['*']
asarUnpack:
  - resources/**
win:
  executableName: yomiko
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSScreenCaptureDescription: yomiko captures the visual novel window so it can OCR the textbox in real time.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
  maintainer: jrgmadrid
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
